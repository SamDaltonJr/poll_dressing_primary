name: Deploy to GitHub Pages

# Single Pages site, two builds combined into one artifact:
#  - Current campaigns (from main, new Firebase project) → site root.
#  - Talarico archive (from talarico-archive tag, old Firebase project) → /talarico-archive/.
#
# Each build's Firebase secrets come from a separate GitHub Environment so the
# two projects' credentials never co-mingle in the same job. The deploy job then
# merges both artifacts and pushes to the github-pages environment.

on:
  push:
    branches: [main]
  # Allow manual re-deploys, useful when only the archive needs a refresh
  # (e.g. after editing the banner injector).
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Build 1: current campaigns (Johnson + Burge), points at the new Firebase.
  # Reads VITE_FIREBASE_* from the production-2026 environment.
  # ---------------------------------------------------------------------------
  build-current:
    runs-on: ubuntu-latest
    environment: production-2026
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Upload current build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-current
          path: dist
          retention-days: 1
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Build 2: Talarico archive — checks out the talarico-archive tag (frozen
  # pre-refactor code) and builds against the old Firebase project. Then a
  # separate checkout of main's scripts/ provides the banner injector, since
  # the script doesn't exist in the tagged commit.
  # ---------------------------------------------------------------------------
  build-archive:
    runs-on: ubuntu-latest
    environment: talarico-archive
    steps:
      # The archived code itself.
      - name: Checkout talarico-archive tag
        uses: actions/checkout@v4
        with:
          ref: talarico-archive
          path: archive-src

      # Latest scripts/ for the banner injector. Sparse checkout keeps it cheap.
      - name: Checkout banner injector script from main
        uses: actions/checkout@v4
        with:
          ref: main
          sparse-checkout: |
            scripts/inject-archive-banner.mjs
          sparse-checkout-cone-mode: false
          path: main-tools

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: archive-src/package-lock.json

      - run: npm ci
        working-directory: archive-src

      # Note the --base override so all asset paths resolve under /talarico-archive/
      # when served alongside the current build.
      - name: Build archive
        working-directory: archive-src
        run: npm run build -- --base=/poll_dressing_primary/talarico-archive/
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Stamp archive banner onto built index.html
        run: |
          node main-tools/scripts/inject-archive-banner.mjs archive-src/dist \
            --label "Talarico for Senate — March 2026 primary" \
            --live-url "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" \
            --live-label "View live site"

      - name: Upload archive build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-archive
          path: archive-src/dist
          retention-days: 1
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Combine the two artifacts and deploy as a single Pages site.
  # ---------------------------------------------------------------------------
  deploy:
    needs: [build-current, build-archive]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download current build
        uses: actions/download-artifact@v4
        with:
          name: dist-current
          path: dist

      - name: Download archive build
        uses: actions/download-artifact@v4
        with:
          name: dist-archive
          path: dist-archive

      # The current build copies public/talarico-archive/ (a dev placeholder)
      # into dist/. Wipe that before placing the real archive so mv doesn't
      # collide with an existing directory.
      - name: Combine builds into single Pages artifact
        run: |
          rm -rf dist/talarico-archive
          mv dist-archive dist/talarico-archive
          ls -la dist/
          ls -la dist/talarico-archive/

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
